<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Efek pendaran lembut saat input fokus */
        .gold-focus:focus {
            box-shadow: 0 0 15px rgba(223, 195, 132, 0.15);
        }
    </style>
</head>

<body class="bg-[#0a0a0a] text-neutral-200 min-h-screen flex items-center justify-center relative overflow-hidden px-4">

    <div class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] bg-amber-950/10 rounded-full filter blur-[100px]">
    </div>
    <div
        class="absolute bottom-[-20%] right-[-10%] w-[500px] h-[500px] bg-neutral-900/50 rounded-full filter blur-[120px]">
    </div>

    <div
        class="w-full max-w-md bg-black/40 backdrop-blur-xl border border-neutral-800/80 p-8 md:p-10 rounded-2xl shadow-2xl relative z-10 transition-all duration-500 hover:border-neutral-700/40">

        <div class="text-center mb-8">
            <a href="#none" class="inline-block">
                <h1 class="font-style-quick-sand text-3xl tracking-[0.1em] text-[#dfc384] font-light mb-1">Noiré
                </h1>
                <p class="text-[10px] tracking-widest text-neutral-400 uppercase">Elegance in Every Mistery.</p>
            </a>
            <h2 class="font-sans text-xl mt-6 text-white font-medium tracking-wide">Selamat Datang Kembali</h2>
            <p class="text-neutral-500 text-xs mt-1">Silakan masuk ke akun Anda untuk melanjutkan</p>
        </div>

        <form action="index.html" method="POST" class="space-y-5">

            <div>
                <label for="email"
                    class="block text-[11px] font-medium uppercase tracking-wider text-neutral-400 mb-2">Alamat
                    Email</label>
                <div class="relative">
                    <span
                        class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-neutral-500">
                        <i data-lucide="mail" class="w-4 h-4"></i>
                    </span>
                    <input type="email" id="email" name="email" required
                        class="w-full bg-neutral-950/60 border border-neutral-800 rounded-lg pl-10 pr-4 py-3 text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-[#dfc384] transition-all duration-300 gold-focus"
                        placeholder="nama@email.com">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label for="password"
                        class="block text-[11px] font-medium uppercase tracking-wider text-neutral-400">Kata
                        Sandi</label>
                    <a href="#"
                        class="text-xs text-[#dfc384]/80 hover:text-[#dfc384] transition-colors hover:underline font-light">Lupa
                        sandi?</a>
                </div>
                <div class="relative">
                    <span
                        class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-neutral-500">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </span>
                    <input type="password" id="password" name="password" required
                        class="w-full bg-neutral-950/60 border border-neutral-800 rounded-lg pl-10 pr-12 py-3 text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-[#dfc384] transition-all duration-300 gold-focus"
                        placeholder="••••••••">

                    <button type="button" id="togglePassword"
                        class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-neutral-500 hover:text-neutral-300 transition-colors cursor-pointer">
                        <i data-lucide="eye" class="w-4 h-4" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="remember" name="remember"
                    class="w-4 h-4 rounded border-neutral-800 bg-neutral-950 text-[#dfc384] focus:ring-0 focus:ring-offset-0 cursor-pointer accent-[#dfc384]">
                <label for="remember"
                    class="ml-2 text-xs text-neutral-400 select-none cursor-pointer hover:text-neutral-300 transition-colors">Ingat
                    perangkat ini</label>
            </div>

            <button type="submit"
                class="w-full mt-2 bg-gradient-to-r from-[#bfa15f] via-[#e7d095] to-[#bfa15f] hover:from-[#e7d095] hover:to-[#bfa15f] text-neutral-950 font-semibold text-xs uppercase tracking-widest py-3.5 px-4 rounded-lg shadow-lg hover:shadow-[#dfc384]/10 hover:scale-[1.01] active:scale-[0.99] transition-all duration-300 cursor-pointer">
                Masuk Akun
            </button>
        </form>

        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-neutral-800/50"></div>
            </div>
            <div class="relative flex justify-center text-[10px] uppercase"><span
                    class="bg-[#0b0b0b] px-3 text-neutral-500 tracking-wider font-light">Atau gunakan</span></div>
        </div>

        <button type="button"
            class="w-full bg-neutral-950/40 border border-neutral-800 hover:bg-neutral-900/40 hover:border-neutral-700 text-neutral-300 rounded-lg py-2.5 px-4 text-xs font-medium flex items-center justify-center gap-2 transition-all duration-300 cursor-pointer">
            <svg class="w-4 h-4" viewBox="0 0 24 24">
                <path fill="currentColor"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="currentColor"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="currentColor"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" />
                <path fill="currentColor"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            Lanjutkan dengan Google
        </button>

        <p class="text-center text-xs text-neutral-500 mt-8 font-light">
            Belum memiliki akun?
            <a href="register.html" class="text-[#dfc384] font-medium hover:underline ml-1">Daftar Sekarang</a>
        </p>

    </div>

    <script>
        // Inisialisasi Lucide Icons
        lucide.createIcons();

        // Logika Show / Hide Password
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', function () {
            // Tukar tipe input
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            // Ganti icon Lucide secara dinamis
            const currentIcon = eyeIcon.getAttribute('data-lucide');
            if (currentIcon === 'eye') {
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            // Re-render icon baru
            lucide.createIcons();
        });
    </script>
</body>

</html>
